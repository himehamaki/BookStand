<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#5b3a29" />
    <link rel="manifest" href="manifest.json" />
    <title>BookStand</title>
    <style>
      :root{
        --wood-1:#6b4a34;
        --wood-2:#563726;
        --wood-3:#452b1f;
        --shelf-shadow: rgba(0,0,0,.22);
        --book-text:#1f2937;
      }

      *{ box-sizing:border-box; }
      html,body{ height:100%; margin:0; }

      body{
        font-family:
          "Hiragino Kaku Gothic ProN",
          "Yu Gothic UI",
          "Noto Sans JP",
          system-ui,
          -apple-system,
          sans-serif;
        color:#f8fafc;
        background:
          radial-gradient(700px 300px at 50% -10%, rgba(255,255,255,.08), transparent 60%),
          linear-gradient(180deg, var(--wood-1), var(--wood-2) 55%, var(--wood-3));
      }

      .wrap{
        min-height: 100dvh;
        display: grid;
        place-items: center;
        padding: 10px;
        max-width: none;
      }

      .title{ display:none; }

      .bookshelf{
        width: min(92vw, 420px);
        padding: 12px;
        border-radius: 16px;
        background: rgba(255,255,255,.08);
        border: 1px solid rgba(255,255,255,.2);
        box-shadow: 0 12px 28px rgba(0,0,0,.25);
      }

      .shelf-row{
        position: relative;
        overflow: visible;
        padding: 10px 12px 18px;
        margin: 0 0 10px;
        border-radius: 12px;
        background: rgba(255,255,255,.04);
      }
      .shelf-row:last-child{ margin-bottom:0; }

      .book-list{
        position: relative;
        z-index: 2;
        display:flex;
        justify-content:center;
        align-items:flex-end;
        gap:7px;
        flex-wrap:nowrap;
      }

.book{
  width: 32px;
  height: 144px;
}
      .book:active{
        transform: translateY(1px) scale(.995);
        filter: brightness(.98);
      }

      .book::before,
      .book::after{
        content:none !important;
      }

      .book.empty{
        background: linear-gradient(90deg, #f2f4f7 0 22%, #ffffff 22% 100%);
        box-shadow:
          0 1px 0 rgba(255,255,255,.5) inset,
          1px 2px 0 rgba(0,0,0,.16);
      }

      .book.filled{
        background:
          linear-gradient(90deg, rgba(255,255,255,.35) 0 22%, transparent 22% 100%),
          linear-gradient(180deg, #f8fafc, #e6e9ee);
        box-shadow:
          0 1px 0 rgba(255,255,255,.5) inset,
          1px 2px 0 rgba(0,0,0,.16);
      }

      .book-title{
        writing-mode: vertical-rl;
        text-orientation: mixed;
        height:auto;
        width:auto;
        max-height:92%;
        margin:0 auto;
        padding:0;
        overflow:hidden;
        text-align:center;
        color:var(--book-text);
        font-size:11px;
        line-height:1.2;
        letter-spacing:.02em;
        user-select:none;
        font-family:
          "Hiragino Mincho ProN",
          "Yu Mincho",
          "Noto Serif JP",
          serif;
      }
      .book.empty .book-title{ color:transparent; }

.plank{
  height: 8px;
  border-radius: 5px;
}

      dialog{
        width:min(460px, 92vw);
        border:none;
        border-radius:14px;
        padding:0;
        overflow:hidden;
        box-shadow: 0 20px 60px rgba(0,0,0,.35);
      }
      dialog::backdrop{ background: rgba(0,0,0,.45); }

      .modal{
        background:#111827;
        color:#f9fafb;
        padding:18px;
      }

      .modal h2{
        margin:0 0 10px;
        font-size:1.02rem;
      }

      .field{ margin-bottom:12px; }

      input, textarea{
        width:100%;
        border:1px solid #4b5563;
        border-radius:12px;
        background:#0f172a;
        color:#f9fafb;
        padding:12px 14px;
        font:inherit;
        font-size:16px;
        line-height:1.5;
      }

      input:focus, textarea:focus{
        outline:none;
        border-color:#93c5fd;
        box-shadow: 0 0 0 3px rgba(147,197,253,.25);
      }

      textarea{
        min-height:280px;
        resize:vertical;
      }

      .row{
        display:flex;
        gap:8px;
        justify-content:flex-end;
        flex-wrap:wrap;
      }

      .btn{
        border:none;
        border-radius:12px;
        min-height:42px;
        padding:10px 14px;
        cursor:pointer;
        font:inherit;
      }
      .btn.sub{ background:#374151; color:#fff; }
      .btn.main{ background:#60a5fa; color:#0b1220; font-weight:700; }
      .btn.danger{ background:#ef4444; color:#fff; margin-right:auto; }
      /* ===== かわいい + 格調高い装飾 ===== */

/* 全体を少し上品な色味に */
:root{
  --gold-1:#e7c97a;
  --gold-2:#c9a44e;
  --gold-shadow:rgba(80,50,10,.28);
}

/* 本棚フレームを小さく上品に */
.bookshelf{
  width:min(94vw, 360px);
  padding:12px 12px 10px;
  border-radius:18px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.14), rgba(255,255,255,.05));
  border:1px solid rgba(255,255,255,.28);
  box-shadow:
    0 14px 30px rgba(0,0,0,.25),
    0 1px 0 rgba(255,255,255,.35) inset;
  position:relative;
}

/* フレーム内側の金ライン */
.bookshelf::before{
  content:"";
  position:absolute;
  inset:7px;
  border-radius:13px;
  pointer-events:none;
  border:1px solid rgba(231,201,122,.45);
  box-shadow: 0 0 0 1px rgba(90,60,20,.08) inset;
}

/* 上下に控えめな飾り罫 */
.bookshelf::after{
  content:"❦";
  position:absolute;
  left:50%;
  top:4px;
  transform:translateX(-50%);
  font-size:12px;
  color:rgba(231,201,122,.9);
  text-shadow:0 1px 0 var(--gold-shadow);
  pointer-events:none;
}

/* 段を詰めて可愛く */
.shelf-row{
  padding:9px 8px 14px;
  margin:0 0 8px;
  border-radius:12px;
  background:rgba(255,255,255,.03);
}

/* 本同士の間隔 */
.book-list{
  gap:10px;
}

/* 本をほんの少し細身へ */
.book{
  width:32px;
  height:144px;
  border-radius:9px 9px 5px 5px;
}

/* 背表紙の上部に金箔ラベル */
.book.filled{
  position:relative;
  background:
    linear-gradient(90deg, rgba(255,255,255,.36) 0 22%, transparent 22% 100%),
    linear-gradient(180deg, #fbfcfe, #e9edf3);
}
.book.filled::before{
  content:"";
  position:absolute;
  left:50%;
  top:8px;
  transform:translateX(-50%);
  width:62%;
  height:10px;
  border-radius:999px;
  background:linear-gradient(180deg, var(--gold-1), var(--gold-2));
  box-shadow:0 1px 0 rgba(255,255,255,.5) inset, 0 1px 2px rgba(0,0,0,.18);
}

/* タイトル文字を少し格調高く */
.book-title{
  font-size:10.5px;
  letter-spacing:.04em;
  color:#2b3445;
  text-shadow:0 1px 0 rgba(255,255,255,.55);
  font-family:
    "Hiragino Mincho ProN",
    "Yu Mincho",
    "Noto Serif JP",
    serif;
}

/* 棚板を華奢に */
.plank{
  height:8px;
  border-radius:5px;
  background: linear-gradient(180deg, #9a6a49, #744c35 68%, #5b3b2b);
  box-shadow: 0 1px 4px rgba(0,0,0,.18) inset;
}
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1 class="title">本棚</h1>

      <section class="bookshelf">
        <div class="shelf-row">
          <div id="row1" class="book-list"></div>
          <div class="plank"></div>
        </div>
        <div class="shelf-row">
          <div id="row2" class="book-list"></div>
          <div class="plank"></div>
        </div>
      </section>
    </main>

    <dialog id="titleDialog">
      <form method="dialog" class="modal" id="titleForm">
        <h2>本のタイトル</h2>
        <div class="field">
          <input id="titleInput" maxlength="60" placeholder="タイトルを入力" />
        </div>
        <div class="row">
          <button class="btn sub" value="cancel" type="button" id="titleCancel">キャンセル</button>
          <button class="btn main" value="default" type="submit">保存</button>
        </div>
      </form>
    </dialog>

    <dialog id="editorDialog">
      <div class="modal">
        <h2 id="editorHeading">本文</h2>
        <div class="field">
          <textarea id="bodyInput" placeholder="ここに本文を書いてください"></textarea>
        </div>
        <div class="row">
          <button class="btn sub" type="button" id="renameBtn">タイトル変更</button>
          <button class="btn danger" type="button" id="deleteBtn">この本を削除</button>
          <button class="btn sub" type="button" id="closeEditor">閉じる</button>
        </div>
      </div>
    </dialog>

    <script>
      const KEY = "bookstand_shelf_v2";
      const SLOT_COUNT = 10;

      let db = load();

      const row1 = document.getElementById("row1");
      const row2 = document.getElementById("row2");

      const titleDialog = document.getElementById("titleDialog");
      const titleForm = document.getElementById("titleForm");
      const titleInput = document.getElementById("titleInput");
      const titleCancel = document.getElementById("titleCancel");

      const editorDialog = document.getElementById("editorDialog");
      const editorHeading = document.getElementById("editorHeading");
      const bodyInput = document.getElementById("bodyInput");
      const renameBtn = document.getElementById("renameBtn");
      const deleteBtn = document.getElementById("deleteBtn");
      const closeEditor = document.getElementById("closeEditor");

      let activeSlot = null;

      render();
      setupPWA();

      function load(){
        try{
          const raw = localStorage.getItem(KEY);
          if(!raw) return { books: [] };
          const parsed = JSON.parse(raw);
          if(!parsed || !Array.isArray(parsed.books)) return { books: [] };
          return parsed;
        }catch{
          return { books: [] };
        }
      }

      function save(){
        localStorage.setItem(KEY, JSON.stringify(db));
      }

      function getBook(slot){
        return db.books.find(b => b.slot === slot) || null;
      }

      function upsertBook(slot, patch){
        const now = new Date().toISOString();
        const found = getBook(slot);
        if(found){
          Object.assign(found, patch, { updatedAt: now });
        }else{
          db.books.push({
            slot,
            title: "",
            body: "",
            updatedAt: now,
            ...patch
          });
        }
        save();
      }

      function removeBook(slot){
        db.books = db.books.filter(b => b.slot !== slot);
        save();
      }

      function render(){
        row1.innerHTML = "";
        row2.innerHTML = "";

        for(let slot=1; slot<=SLOT_COUNT; slot++){
          const book = getBook(slot);
          const hasTitle = !!(book && book.title && book.title.trim());

          const btn = document.createElement("button");
          btn.className = "book " + (hasTitle ? "filled" : "empty");
          btn.type = "button";
          btn.dataset.slot = String(slot);
          btn.title = hasTitle ? book.title : "未設定";
          btn.innerHTML = `<p class="book-title">${hasTitle ? escapeHtml(book.title) : "　"}</p>`;
          btn.addEventListener("click", () => onBookTap(slot));

          if(slot <= 5) row1.appendChild(btn);
          else row2.appendChild(btn);
        }
      }

      function onBookTap(slot){
        activeSlot = slot;
        const book = getBook(slot);

        if(!book || !book.title || !book.title.trim()){
          titleInput.value = book?.title ?? "";
          titleDialog.showModal();
          setTimeout(() => titleInput.focus(), 0);
          return;
        }

        openEditor(slot);
      }

      titleForm.addEventListener("submit", (e) => {
        e.preventDefault();
        if(activeSlot == null) return;

        const nextTitle = titleInput.value.trim();
        const current = getBook(activeSlot) || { body: "" };
        upsertBook(activeSlot, { title: nextTitle, body: current.body || "" });

        titleDialog.close();
        render();

        editorHeading.textContent = nextTitle || `本 ${activeSlot}`;

        if(nextTitle && !editorDialog.open){
          openEditor(activeSlot);
        }
      });

      titleCancel.addEventListener("click", () => {
        titleDialog.close();
      });

      function openEditor(slot){
        const book = getBook(slot) || { title:"", body:"" };
        editorHeading.textContent = book.title || `本 ${slot}`;
        bodyInput.value = book.body || "";
        editorDialog.showModal();
        setTimeout(() => bodyInput.focus(), 0);
      }

      bodyInput.addEventListener("input", () => {
        if(activeSlot == null) return;
        const book = getBook(activeSlot) || { title:"" };
        upsertBook(activeSlot, { title: book.title || "", body: bodyInput.value });
      });

      renameBtn.addEventListener("click", () => {
        if(activeSlot == null) return;
        const book = getBook(activeSlot) || { title:"", body:"" };
        titleInput.value = book.title || "";
        titleDialog.showModal();
        setTimeout(() => titleInput.focus(), 0);
      });

      deleteBtn.addEventListener("click", () => {
        if(activeSlot == null) return;
        if(!confirm("この本を削除します。よろしいですか？")) return;
        removeBook(activeSlot);
        editorDialog.close();
        render();
      });

      closeEditor.addEventListener("click", () => editorDialog.close());

      function escapeHtml(str){
        return String(str)
          .replaceAll("&","&amp;")
          .replaceAll("<","&lt;")
          .replaceAll(">","&gt;")
          .replaceAll('"',"&quot;")
          .replaceAll("'","&#39;");
      }

      function setupPWA(){
        if("serviceWorker" in navigator){
          navigator.serviceWorker.register("service-worker.js").catch(()=>{});
        }
      }
    </script>
  </body>
</html>
