<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111827" />
    <link rel="manifest" href="manifest.json" />
    <title>BookStand</title>
    <style>
      :root {
        --bg: #0b1020;
        --panel: #111827;
        --panel-2: #1f2937;
        --text: #f9fafb;
        --muted: #9ca3af;
        --accent: #60a5fa;
        --danger: #ef4444;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: linear-gradient(180deg, #0b1020 0%, #111827 100%);
        color: var(--text);
        min-height: 100vh;
      }
      .app {
        max-width: 1200px;
        margin: 0 auto;
        padding: 16px;
      }
      h1 { margin: 0 0 8px; font-size: 1.6rem; }
      .sub { color: var(--muted); margin-bottom: 16px; }
      .toolbar {
        display: flex;
        gap: 8px;
        margin-bottom: 12px;
        flex-wrap: wrap;
      }
      button {
        background: var(--panel-2);
        color: var(--text);
        border: 1px solid #374151;
        border-radius: 10px;
        padding: 10px 12px;
        cursor: pointer;
      }
      button.primary { background: var(--accent); color: #031025; border: none; font-weight: 700; }
      button.danger { background: transparent; border-color: #7f1d1d; color: #fecaca; }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
        gap: 12px;
      }
      .card {
        background: rgba(17, 24, 39, 0.85);
        border: 1px solid #374151;
        border-radius: 12px;
        padding: 12px;
      }
      .slot { color: var(--muted); font-size: 0.9rem; margin-bottom: 8px; }
      .title { font-size: 1rem; font-weight: 700; margin-bottom: 6px; }
      .meta { color: var(--muted); font-size: 0.85rem; line-height: 1.5; }
      .actions { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
      dialog {
        border: 1px solid #374151;
        border-radius: 12px;
        background: var(--panel);
        color: var(--text);
        width: min(560px, 92vw);
      }
      dialog::backdrop { background: rgba(0,0,0,0.55); }
      .field { margin-bottom: 12px; }
      label { display: block; margin-bottom: 6px; color: var(--muted); }
      input, textarea, select {
        width: 100%;
        background: #0b1220;
        color: var(--text);
        border: 1px solid #374151;
        border-radius: 10px;
        padding: 10px;
      }
      textarea { min-height: 240px; resize: vertical; }
      .list {
        display: grid;
        gap: 10px;
        margin-top: 10px;
      }
      .item {
        padding: 10px;
        border: 1px solid #374151;
        border-radius: 10px;
        background: #0f172a;
      }
      .empty { color: var(--muted); padding: 12px; border: 1px dashed #374151; border-radius: 10px; }
      .topline { display: flex; justify-content: space-between; gap: 8px; align-items: center; }
      .muted { color: var(--muted); font-size: 0.85rem; }
    </style>
  </head>
  <body>
    <main class="app">
      <h1>📚 BookStand</h1>
      <div class="sub">10冊固定の本棚で管理する、シンプル執筆アプリ</div>
      <div class="toolbar">
        <button class="primary" id="createBookBtn">＋ 新しい本</button>
      </div>
      <section id="shelf" class="grid"></section>
    </main>

    <dialog id="bookDialog">
      <form method="dialog" id="bookForm">
        <h3>新しい本を作成</h3>
        <div class="field">
          <label for="bookTitle">本のタイトル</label>
          <input id="bookTitle" required maxlength="60" placeholder="例: 夏の終わり" />
        </div>
        <div class="field">
          <label for="bookSlot">入れるスロット（1〜10）</label>
          <select id="bookSlot" required></select>
        </div>
        <div class="actions">
          <button value="cancel">キャンセル</button>
          <button class="primary" id="saveBookBtn" value="default">作成</button>
        </div>
      </form>
    </dialog>

    <dialog id="editorDialog">
      <div id="editorRoot"></div>
    </dialog>

    <script>
      const DB_KEY = "bookstand_v1";

      const state = loadState();
      renderShelf();
      setupPWA();

      document.getElementById("createBookBtn").addEventListener("click", openCreateBookDialog);

      function defaultState() {
        return {
          shelves: Array.from({ length: 10 }, (_, i) => ({ slot: i + 1, bookId: null })),
          books: []
        };
      }

      function nowIso() {
        return new Date().toISOString();
      }

      function fmtDate(iso) {
        if (!iso) return "-";
        const d = new Date(iso);
        return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
      }

      function loadState() {
        const raw = localStorage.getItem(DB_KEY);
        if (!raw) {
          const initial = defaultState();
          localStorage.setItem(DB_KEY, JSON.stringify(initial));
          return initial;
        }
        try {
          const parsed = JSON.parse(raw);
          if (!parsed.shelves || !parsed.books) return defaultState();
          return parsed;
        } catch {
          return defaultState();
        }
      }

      function persist() {
        localStorage.setItem(DB_KEY, JSON.stringify(state));
      }

      function getBookById(bookId) {
        return state.books.find(b => b.id === bookId) || null;
      }

      function renderShelf() {
        const shelf = document.getElementById("shelf");
        shelf.innerHTML = "";

        for (const slot of state.shelves) {
          const card = document.createElement("article");
          card.className = "card";
          const book = slot.bookId ? getBookById(slot.bookId) : null;

          if (!book) {
            card.innerHTML = `
              <div class="slot">スロット ${slot.slot}</div>
              <div class="title">（空）</div>
              <div class="meta">本を作成して執筆を開始できます。</div>
              <div class="actions"><button data-action="new-in-slot" data-slot="${slot.slot}">この枠で作成</button></div>
            `;
          } else {
            card.innerHTML = `
              <div class="slot">スロット ${slot.slot}</div>
              <div class="title">${escapeHtml(book.title)}</div>
              <div class="meta">開始日: ${fmtDate(book.createdAt)}<br>最終更新: ${fmtDate(book.updatedAt)}</div>
              <div class="actions">
                <button data-action="open" data-id="${book.id}">開く</button>
                <button data-action="rename" data-id="${book.id}">タイトル変更</button>
                <button class="danger" data-action="delete" data-id="${book.id}">削除</button>
              </div>
            `;
          }
          shelf.appendChild(card);
        }

        shelf.querySelectorAll("button").forEach(btn => btn.addEventListener("click", onShelfAction));
      }

      function onShelfAction(e) {
        const action = e.currentTarget.dataset.action;
        if (action === "new-in-slot") {
          openCreateBookDialog(Number(e.currentTarget.dataset.slot));
          return;
        }
        const id = e.currentTarget.dataset.id;
        const book = getBookById(id);
        if (!book) return;

        if (action === "open") openEditor(book.id);
        if (action === "rename") renameBook(book.id);
        if (action === "delete") deleteBook(book.id);
      }

      function openCreateBookDialog(preferredSlot = null) {
        const dialog = document.getElementById("bookDialog");
        const form = document.getElementById("bookForm");
        const titleInput = document.getElementById("bookTitle");
        const slotSelect = document.getElementById("bookSlot");

        titleInput.value = "";
        slotSelect.innerHTML = "";

        const emptySlots = state.shelves.filter(s => !s.bookId).map(s => s.slot);
        if (emptySlots.length === 0) {
          alert("本棚は10冊すべて使用中です。削除して空きを作ってください。");
          return;
        }

        for (const s of emptySlots) {
          const option = document.createElement("option");
          option.value = String(s);
          option.textContent = `スロット ${s}`;
          if (preferredSlot === s) option.selected = true;
          slotSelect.appendChild(option);
        }

        const submitHandler = (ev) => {
          ev.preventDefault();
          const title = titleInput.value.trim();
          const slot = Number(slotSelect.value);
          if (!title || !slot) return;
          createBook(title, slot);
          dialog.close();
          form.removeEventListener("submit", submitHandler);
        };

        form.addEventListener("submit", submitHandler);
        dialog.showModal();
      }

      function createBook(title, slotNo) {
        const slot = state.shelves.find(s => s.slot === slotNo);
        if (!slot || slot.bookId) return;
        const id = crypto.randomUUID();
        const t = nowIso();
        state.books.push({ id, title, createdAt: t, updatedAt: t, fragments: [] });
        slot.bookId = id;
        persist();
        renderShelf();
      }

      function renameBook(bookId) {
        const book = getBookById(bookId);
        if (!book) return;
        const next = prompt("新しいタイトル", book.title);
        if (!next) return;
        book.title = next.trim().slice(0, 60) || book.title;
        book.updatedAt = nowIso();
        persist();
        renderShelf();
      }

      function deleteBook(bookId) {
        const book = getBookById(bookId);
        if (!book) return;
        const ok = confirm(`「${book.title}」を削除します。元に戻せません。`);
        if (!ok) return;

        state.books = state.books.filter(b => b.id !== bookId);
        const slot = state.shelves.find(s => s.bookId === bookId);
        if (slot) slot.bookId = null;
        persist();
        renderShelf();
      }

      function openEditor(bookId) {
        const book = getBookById(bookId);
        if (!book) return;

        const dialog = document.getElementById("editorDialog");
        const root = document.getElementById("editorRoot");

        root.innerHTML = `
          <div class="topline">
            <h3 style="margin:0">${escapeHtml(book.title)}</h3>
            <button id="closeEditorBtn">閉じる</button>
          </div>
          <div class="muted" style="margin:8px 0 12px;">開始日: ${fmtDate(book.createdAt)} / 最終更新: ${fmtDate(book.updatedAt)}</div>
          <div class="actions" style="margin-bottom:10px;">
            <button class="primary" id="addFragmentBtn">＋ 断片を追加</button>
          </div>
          <div id="fragmentList" class="list"></div>
        `;

        const list = root.querySelector("#fragmentList");
        renderFragments(list, bookId);

        root.querySelector("#closeEditorBtn").addEventListener("click", () => dialog.close());
        root.querySelector("#addFragmentBtn").addEventListener("click", () => {
          const b = getBookById(bookId);
          if (!b) return;
          const t = nowIso();
          b.fragments.push({ id: crypto.randomUUID(), title: "", body: "", createdAt: t, updatedAt: t });
          b.updatedAt = t;
          persist();
          openEditor(bookId);
        });

        dialog.showModal();
      }

      function renderFragments(container, bookId) {
        const book = getBookById(bookId);
        if (!book) return;
        if (book.fragments.length === 0) {
          container.innerHTML = '<div class="empty">まだ断片がありません。「＋ 断片を追加」から始めてください。</div>';
          return;
        }

        container.innerHTML = "";
        for (const fragment of book.fragments) {
          const el = document.createElement("div");
          el.className = "item";
          el.innerHTML = `
            <div class="field">
              <label>断片タイトル</label>
              <input data-kind="title" data-id="${fragment.id}" value="${escapeAttr(fragment.title)}" placeholder="例: 駅前の再会" />
            </div>
            <div class="field">
              <label>本文</label>
              <textarea data-kind="body" data-id="${fragment.id}" placeholder="ここに本文を入力">${escapeHtml(fragment.body)}</textarea>
            </div>
            <div class="muted">作成: ${fmtDate(fragment.createdAt)} / 更新: ${fmtDate(fragment.updatedAt)}</div>
            <div class="actions"><button class="danger" data-kind="remove" data-id="${fragment.id}">断片を削除</button></div>
          `;
          container.appendChild(el);
        }

        container.querySelectorAll("input[data-kind='title']").forEach(input => {
          input.addEventListener("input", (e) => updateFragment(bookId, e.target.dataset.id, { title: e.target.value }));
        });
        container.querySelectorAll("textarea[data-kind='body']").forEach(textarea => {
          textarea.addEventListener("input", (e) => updateFragment(bookId, e.target.dataset.id, { body: e.target.value }));
        });
        container.querySelectorAll("button[data-kind='remove']").forEach(btn => {
          btn.addEventListener("click", (e) => removeFragment(bookId, e.target.dataset.id));
        });
      }

      function updateFragment(bookId, fragmentId, patch) {
        const book = getBookById(bookId);
        if (!book) return;
        const fragment = book.fragments.find(f => f.id === fragmentId);
        if (!fragment) return;
        Object.assign(fragment, patch, { updatedAt: nowIso() });
        book.updatedAt = fragment.updatedAt;
        persist();
        renderShelf();
      }

      function removeFragment(bookId, fragmentId) {
        const book = getBookById(bookId);
        if (!book) return;
        const ok = confirm("この断片を削除します。元に戻せません。");
        if (!ok) return;
        book.fragments = book.fragments.filter(f => f.id !== fragmentId);
        book.updatedAt = nowIso();
        persist();
        openEditor(bookId);
      }

      function escapeHtml(str) {
        return String(str)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }

      function escapeAttr(str) {
        return escapeHtml(str).replaceAll("`", "&#96;");
      }

      function setupPWA() {
        if ("serviceWorker" in navigator) {
          navigator.serviceWorker.register("service-worker.js").catch(() => {});
        }
      }
    </script>
  </body>
</html>
